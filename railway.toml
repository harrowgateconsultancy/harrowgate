[build]
builder = "NIXPACKS"
buildCommand = "pnpm install --frozen-lockfile && BASE_PATH=/ NODE_ENV=production pnpm --filter @workspace/harrowgate run build && NODE_ENV=production pnpm --filter @workspace/api-server run build"

[deploy]
startCommand = "node --enable-source-maps artifacts/api-server/dist/index.mjs"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[deploy.healthchecks]]
type = "PATH"
path = "/api/healthz"
timeoutSecs = 30
